name: Access Catalog & Resolver Unit Tests

# Enterprise Access & Administration Platform (Issue #226) pure-logic unit
# tests -- no emulator, no deployment, no production access, no repository
# secrets. Runs functions/test/permissionCatalog.test.mjs (Spec sec21
# acceptance criteria A2) and functions/test/resolveEffectivePermission.test.mjs
# (Spec sec21 A1/A3, S1/S2) against the compiled functions/lib output.

on:
  pull_request:
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/**"
      - "functions/test/permissionCatalog.test.mjs"
      - "functions/test/resolveEffectivePermission.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - ".github/workflows/access-catalog-unit-tests.yml"
  push:
    branches: [main]
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/**"
      - "functions/test/permissionCatalog.test.mjs"
      - "functions/test/resolveEffectivePermission.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - ".github/workflows/access-catalog-unit-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  access-catalog-unit-tests:
    name: Permission catalog + resolver unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies (reproducible)
        run: npm ci
        working-directory: functions

      - name: Permission catalog + resolver unit tests (build + run)
        run: npm run test:access
        working-directory: functions
