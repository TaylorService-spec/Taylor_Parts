name: Access Audit Service Tests

# Enterprise Access & Administration Platform (Issue #226) trusted-writer
# test for functions/src/access/auditEventWriter.ts -- runs against a
# freshly started Firestore-only emulator (no Auth needed: this module is
# exercised via the Admin SDK directly, matching how it will actually be
# called by future trusted-writer commands). Emulator-only, project
# "taylor-parts", loopback host -- no production access, no credentials,
# no repository secrets.

on:
  pull_request:
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/auditEventWriter.ts"
      - "functions/test/auditEventWriter.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - "firebase.json"
      - ".github/workflows/access-audit-service-tests.yml"
  push:
    branches: [main]
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/auditEventWriter.ts"
      - "functions/test/auditEventWriter.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - "firebase.json"
      - ".github/workflows/access-audit-service-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  access-audit-service-tests:
    name: Audit Event trusted-writer tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # The Firestore emulator is a Java process.
      - name: Set up Java (required by the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install functions dependencies (reproducible)
        run: npm ci
        working-directory: functions

      - name: Start Firestore emulator (background)
        run: |
          nohup node node_modules/firebase-tools/lib/bin/firebase.js emulators:start --only firestore --project taylor-parts --config ../firebase.json > /tmp/firestore-emulator.log 2>&1 &
          for i in $(seq 1 60); do
            if grep -q "All emulators ready" /tmp/firestore-emulator.log 2>/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Firestore emulator did not become ready in time"
          cat /tmp/firestore-emulator.log
          exit 1
        working-directory: functions

      - name: Audit Event trusted-writer tests (build + run)
        run: npm run test:audit
        working-directory: functions

      - name: Upload emulator debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: access-audit-service-emulator-logs
          path: |
            /tmp/firestore-emulator.log
            firestore-debug.log
          if-no-files-found: ignore
          retention-days: 7
