name: Access Trusted-Writer Command Tests

# Enterprise Access & Administration Platform (Issue #226) test for
# functions/src/access/trustedWriterCommands.ts -- runs against freshly
# started Firestore + Auth emulators (this module needs both: Firestore
# for role assignments/access requests/audit events, Auth for the
# post-commit claims refresh and setUserStatus's disable/enable call).
# Emulator-only, project "taylor-parts", loopback host -- no production
# access, no credentials, no repository secrets. NOT a production
# activation workflow -- these commands are unexported from functions/
# src/index.ts and stay inert until Issue #15 authorizes deployment.

on:
  pull_request:
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/**"
      - "functions/test/trustedWriterCommands.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - "firebase.json"
      - ".github/workflows/access-trusted-writer-tests.yml"
  push:
    branches: [main]
    paths:
      - "functions/src/types/access.ts"
      - "functions/src/access/**"
      - "functions/test/trustedWriterCommands.test.mjs"
      - "functions/package.json"
      - "functions/package-lock.json"
      - "firebase.json"
      - ".github/workflows/access-trusted-writer-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  access-trusted-writer-tests:
    name: Trusted-writer command tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies (reproducible)
        run: npm ci
        working-directory: functions

      - name: Start Firestore + Auth emulators (background)
        run: |
          nohup node node_modules/firebase-tools/lib/bin/firebase.js emulators:start --only firestore,auth --project taylor-parts --config ../firebase.json > /tmp/trusted-writer-emulator.log 2>&1 &
          for i in $(seq 1 60); do
            if grep -q "All emulators ready" /tmp/trusted-writer-emulator.log 2>/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Emulators did not become ready in time"
          cat /tmp/trusted-writer-emulator.log
          exit 1
        working-directory: functions

      - name: Trusted-writer command tests (build + run)
        run: npm run test:trustedWriter
        working-directory: functions

      - name: Upload emulator debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: access-trusted-writer-emulator-logs
          path: /tmp/trusted-writer-emulator.log
          if-no-files-found: ignore
          retention-days: 7
